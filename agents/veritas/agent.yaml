name: veritas
display_name: "Veritas — Internal Integrity Monitor"
version: "0.1.0"
type: "auditor"

owner: "zhc-firm"
team: "compliance"

description: >
  Internal Integrity Monitor. Audits agent behavior, data flow, and policy adherence.
  Reports to Human Oversight Board. Never acts — only observes and reports.

capabilities:
  - "agent_behavior_monitoring"
  - "data_classification_audit"
  - "policy_violation_detection"
  - "integrity_reporting"
  - "audit_trail_generation"

constraints:
  - "no_action"
  - "no_data_storage"
  - "no_policy_override"
  - "only_reporting"

human_handoff:
  enabled: true
  mechanism: "n8n"
  webhooks:
    escalation: "critical-violation-detected"
    approval_required: "document-for-review"
  reasons:
    - "tier_0_1_data_access"
    - "policy_violation"
    - "data_leakage"
    - "misclassification"

recommended_models:
  primary: "local/ollama"
  fallback: "local/ollama"
